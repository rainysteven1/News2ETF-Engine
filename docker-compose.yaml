name: News2ETF-Engine
services:
  postgres:
    image: postgres:16-alpine
    container_name: News2ETF-Engine-postgres
    restart: always
    environment:
      - POSTGRES_USER=news2etf
      - POSTGRES_PASSWORD=news2etf_password
      - POSTGRES_DB=news2etf
      - TZ=Asia/Shanghai
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news2etf"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.5.10
    container_name: News2ETF-Engine-loki
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "43100:3100"
    volumes:
      - ./manifests/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:12.3.0
    container_name: News2ETF-Engine-grafana
    restart: always
    ports:
      - "43000:3000"
    environment:
      - TZ=Asia/Shanghai
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./manifests/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

  app:
    image: news2etf-engine:latest
    container_name: News2ETF-Engine-app
    user: "1000:1000"
    restart: always
    ports:
      - "8040:8040"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - ENV_MODE=docker
    volumes:
      - ./configs:/app/configs:ro
      - ./config.docker.toml:/app/config.docker.toml:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started

volumes:
  postgres_data:
  grafana_data:
  loki_data:
